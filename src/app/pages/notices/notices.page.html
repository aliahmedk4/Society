<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start"><ion-button fill="clear" color="light" (click)="openMenu()"><ion-icon name="menu-outline" slot="icon-only"></ion-icon></ion-button></ion-buttons>
    <ion-title>Notices</ion-title>
    <ion-buttons slot="end"><ion-button fill="clear" color="light" (click)="addNotice()"><ion-icon name="add-outline" slot="icon-only"></ion-icon></ion-button></ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="notices-content">
  <div class="not-hero">
    <div class="nh-c1"></div><div class="nh-c2"></div>
    <div class="nh-inner"><div class="nh-icon">📢</div><div class="nh-title">Society Notices</div><div class="nh-sub">{{ notices.length }} notice{{ notices.length !== 1 ? 's' : '' }} posted</div></div>
    <button class="nh-add-btn" (click)="addNotice()"><ion-icon name="add-outline"></ion-icon> Post New Notice</button>
  </div>
  <div class="not-body">
    <div *ngIf="notices.length === 0" class="empty-state"><div class="es-icon">📭</div><div class="es-title">No notices yet</div><div class="es-sub">Tap "Post New Notice" to get started</div></div>
    <div *ngFor="let n of notices" class="not-card" [class.urgent-card]="n.priority==='urgent'">
      <div class="nc-header">
        <div class="nc-badge" [class.urgent-badge]="n.priority==='urgent'" [class.normal-badge]="n.priority==='normal'">{{ n.priority === 'urgent' ? '🚨 URGENT' : '📢 NOTICE' }}</div>
        <button class="nc-del" (click)="deleteNotice(n)"><ion-icon name="trash-outline"></ion-icon></button>
      </div>
      <div class="nc-title">{{ n.title }}</div>
      <div class="nc-body" *ngIf="n.body">{{ n.body }}</div>
      <div class="nc-footer"><ion-icon name="time-outline"></ion-icon> {{ n.date | date:'dd MMM yyyy · hh:mm a' }}</div>
    </div>
    <div style="height:80px"></div>
  </div>
</ion-content>
